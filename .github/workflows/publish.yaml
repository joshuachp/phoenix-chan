name: publish
# When a release is published or called manually
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - release-[0-9]+.[0-9]+
# Only needs to clone the repository
permissions:
  contents: write
  pull-requests: write
  id-token: write
# Safer shell
defaults:
  run:
    shell: bash
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  # It's not safe to cancel the publish
  cancel-in-progress: false
env:
  CI: "true"
  CARGO_TERM_COLOR: always
jobs:
  # Release unpublished packages.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-24.04
    if: ${{ github.repository_owner == 'joshuachp' }}
    permissions:
      contents: write
      id-token: write
    steps:
      - &checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - &install-rust
        uses: actions-rust-lang/setup-rust-toolchain@v1.16.1
      - &login-crates
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Run release-plz
        uses: release-plz/action@v0.5.130
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # Create a PR with the new versions and changelog, preparing the next release.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-24.04
    if: ${{ github.repository_owner == 'joshuachp' }}
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - *checkout
      - *install-rust
      - *login-crates
      - name: Run release-plz
        uses: release-plz/action@v0.5.130
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
