name: common
on:
  workflow_call:
  workflow_dispatch:
permissions:
  contents: read
defaults:
  run:
    shell: bash
env:
  CLICOLOR: 1
jobs:
  spelling:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: crate-ci/typos@v1.47.0
  conventional-commit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: crate-ci/committed@v1.1.11
        with:
          args: "-vv"
